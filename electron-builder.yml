appId: com.memorymusic.app
productName: MemoryMusic
directories:
  output: release
files:
  - out/**
  - package.json
asar: true
win:
  executableName: MemoryMusic
  target:
    - nsis
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
